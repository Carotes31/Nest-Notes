<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; transition: background 0.3s, color 0.3s; }

:root {
  --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #222240; --surface3: #2a2a50;
  --accent: #7c6af7; --accent2: #a78bfa; --accent3: #c4b5fd;

.header { position: sticky; top: 0; z-index: 100; background: rgba(15,15,26,0.95); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 12px; height: 60px; }
.app-title { font-size: 22px; font-weight: 700; background: linear-gradient(135deg, var(--accent2), var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; flex: 1; }
#back-btn { display: none; background: none; border: none; color: var(--accent2); font-size: 20px; font-weight: 600; cursor: pointer; align-items: center; }

.toolbar { display: flex; gap: 10px; align-items: center; }

.search-wrap { padding: 10px 16px; border-bottom: 1px solid var(--border2); }

.auth-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: inherit; font-size: 14px; outline: none; margin-bottom: 10px; }
.auth-input:focus { border-color: var(--accent); }
.auth-btn { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 10px; padding: 12px; color: white; font-weight: 600; font-size: 14px; cursor: pointer; margin-top: 4px; }
.auth-btn:disabled { opacity: 0.6; }
.auth-btn-ghost { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: var(--text); font-weight: 600; font-size: 14px; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.auth-switch { text-align: center; margin-top: 18px; font-size: 13px; color: var(--text2); }
.auth-switch span { color: var(--accent2); cursor: pointer; font-weight: 600; }
.auth-error { background: rgba(248,113,113,0.12); color: var(--danger); font-size: 12px; padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; display: none; }
.auth-forgot { text-align: center; font-size: 12px; color: var(--text3); margin-top: 12px; cursor: pointer; }
.auth-divider { display: flex; align-items: center; gap: 10px; margin: 18px 0; color: var(--text3); font-size: 12px; }
.auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── Sync indicator ── */
#sync-indicator { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); padding: 4px 8px; border-radius: 20px; background: var(--surface2); cursor: pointer; }
#sync-indicator .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); }
#sync-indicator.synced .dot { background: #4ade80; }
#sync-indicator.syncing .dot { background: var(--accent); animation: pulse 1s infinite; }
#sync-indicator.offline .dot { background: var(--danger); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

#account-overlay .modal { text-align: center; }
#account-email { color: var(--text2); font-size: 13px; margin-bottom: 18px; word-break: break-all; }
</style>

<script>
// ── Data ──────────────────────────────────────────────
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let notes = JSON.parse(localStorage.getItem('nestnotes') || '[]');
let settings = JSON.parse(localStorage.getItem('nestnotes_settings') || '{"theme":"default"}');
let currentNoteId = null;

// ── Cloud sync state ────────────────────────────────────
let sb = null;                 // rempli quand supabase-ready
let currentUser = null;
let realtimeChannel = null;
let applyingRemoteUpdate = false; // évite de re-push ce qu'on vient de recevoir
let saveDebounceTimer = null;

const setSyncStatus = (status) => {
  const el = document.getElementById('sync-indicator');
  const label = document.getElementById('sync-label');
  if (!el) return;
  el.classList.remove('synced','syncing','offline');
  if (status === 'synced') { el.classList.add('synced'); label.textContent = 'Sync'; }
  else if (status === 'syncing') { el.classList.add('syncing'); label.textContent = '...'; }
  else if (status === 'offline') { el.classList.add('offline'); label.textContent = 'Hors-ligne'; }
  else { label.textContent = '…'; }
};

const localSave = () => {
  localStorage.setItem('nestnotes', JSON.stringify(notes));
  localStorage.setItem('nestnotes_settings', JSON.stringify(settings));
};

const pushToCloud = () => {
  if (!sb || !currentUser) return;
  setSyncStatus('syncing');
  clearTimeout(saveDebounceTimer);
  saveDebounceTimer = setTimeout(async () => {
    try {
      const { error } = await sb
        .from('nestnotes')
        .upsert({
          user_id: currentUser.id,
          notes,
          settings,
          updated_at: new Date().toISOString()
        }, { onConflict: 'user_id' });
      if (error) throw error;
      setSyncStatus('synced');
    } catch (err) {
      console.error('Erreur de synchronisation cloud :', err);
      setSyncStatus('offline');
    }
  }, 500); // debounce pour éviter d'écrire à chaque frappe
};

const save = () => {
  localSave();
  if (!applyingRemoteUpdate) pushToCloud();
};

const getNote = id => notes.find(n => n.id === id);

// ── Cloud auth & sync wiring ────────────────────────────
const applyRemoteRow = (row) => {
  applyingRemoteUpdate = true;
  notes = row.notes || [];
  settings = row.settings || settings;
  localSave();
  applyTheme(settings.theme || 'default');
  if (currentNoteId && getNote(currentNoteId)) renderNote(currentNoteId);
  else goHome();
  applyingRemoteUpdate = false;
};

const startCloudSync = async (user) => {
  currentUser = user;
  setSyncStatus('syncing');

  // 1. Charger l'état initial depuis Supabase
  try {
    const { data, error } = await sb
      .from('nestnotes')
      .select('notes, settings')
      .eq('user_id', user.id)
      .maybeSingle();

    if (error) throw error;

    if (data) {
      applyRemoteRow(data);
    } else {
      // Pas encore de ligne pour cet utilisateur : on pousse l'état local (migration)
      pushToCloud();
    }
    setSyncStatus('synced');
  } catch (err) {
    console.error('Erreur de chargement initial :', err);
    setSyncStatus('offline');
  }

  // 2. S'abonner aux changements en temps réel (Realtime)
  if (realtimeChannel) sb.removeChannel(realtimeChannel);
  realtimeChannel = sb
    .channel('nestnotes-changes-' + user.id)
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'nestnotes',
      filter: `user_id=eq.${user.id}`
    }, (payload) => {
      if (applyingRemoteUpdate) return;
      if (payload.new && payload.new.notes) applyRemoteRow(payload.new);
    })
    .subscribe();
};

const stopCloudSync = () => {
  if (realtimeChannel) { sb.removeChannel(realtimeChannel); realtimeChannel = null; }
  currentUser = null;
  setSyncStatus('');
};

// ── Auth screen logic ───────────────────────────────────
let authMode = 'login'; // 'login' | 'signup'

const showAuthScreen = (show) => {
  document.getElementById('auth-screen').style.display = show ? 'flex' : 'none';
};

const setAuthError = (msg) => {
  const el = document.getElementById('auth-error');
  if (msg) { el.textContent = msg; el.style.display = 'block'; }
  else { el.style.display = 'none'; }
};

const friendlyAuthError = (msg) => {
  if (!msg) return 'Une erreur est survenue, réessaie.';
  const m = msg.toLowerCase();
  if (m.includes('invalid login credentials')) return 'Email ou mot de passe incorrect.';
  if (m.includes('user already registered')) return 'Un compte existe déjà avec cet email.';
  if (m.includes('password should be at least')) return 'Mot de passe trop court (6 caractères min).';
  if (m.includes('unable to validate email') || m.includes('invalid email')) return 'Adresse email invalide.';
  if (m.includes('email not confirmed')) return 'Confirme ton email avant de te connecter (vérifie ta boîte mail).';
  if (m.includes('rate limit')) return 'Trop de tentatives, réessaie plus tard.';
  return msg;
};

const wireAuthScreen = () => {
  const emailInput = document.getElementById('auth-email');
  const passInput = document.getElementById('auth-password');
  const submitBtn = document.getElementById('auth-submit');
  const forgotLink = document.getElementById('auth-forgot');

  const updateModeUI = () => {
    submitBtn.textContent = authMode === 'login' ? 'Se connecter' : 'Créer mon compte';
    document.getElementById('auth-sub').textContent =
